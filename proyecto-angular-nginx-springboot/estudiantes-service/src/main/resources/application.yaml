server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: estudiantes-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:estudiantes_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  file:
    name: logs/app.log
  level:
    root: INFO
    com.estudiantes.service: DEBUG
    org.hibernate.SQL: DEBUG