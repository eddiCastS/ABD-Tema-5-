# nginx.conf - Configuracion para correr TODO local:
#   - Nginx sirve los archivos compilados de Angular (ng build)
#   - Nginx hace reverse proxy de /api hacia Spring Boot (localhost:8080)
#
# Uso tipico en Windows/Linux con Nginx instalado localmente:
#   1) ng build  -> genera dist/sistema-escolar-frontend/browser
#   2) Copiar el contenido de esa carpeta a la "root" indicada abajo
#      (o ajustar la ruta "root" para que apunte directo al dist)
#   3) Levantar Spring Boot normalmente (mvn spring-boot:run / jar) en :8080
#   4) Levantar nginx con este archivo de configuracion

server {
    listen       80;
    server_name  localhost;

    # Ajusta esta ruta a donde quede tu build de Angular
    root   C:/nginx/html/sistema-escolar-frontend;
    index  index.html;

    # Sirve la SPA de Angular y soporta sus rutas internas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reenvia /api hacia Spring Boot, que corre local en el puerto 8080
    # (Spring Boot ya tiene server.servlet.context-path: /api)
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Cache largo para los assets versionados de Angular
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
