services:

  postgres:
    image: postgres:16-alpine
    container_name: estudiantes-db
    environment:
      POSTGRES_DB: estudiantes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spring-boot:
    build:
      context: ./estudiantes-service
    container_name: estudiantes-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: estudiantes_db
      DB_USER: postgres
      DB_PASSWORD: 1234
    expose:
      - "8080"

  frontend:
    build:
      context: ./sistema-escolar-frontend
      dockerfile: docker/Dockerfile.frontend
    container_name: sistema-escolar-frontend
    depends_on:
      - spring-boot
    ports:
      - "80:80"

volumes:
  postgres_data:
